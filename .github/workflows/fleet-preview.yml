name: Fleet System Preview on Ubuntu

on:
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      SITE_NAME: site1.local
      ADMIN_PASSWORD: admin123
      DB_ROOT_PASSWORD: root123

    steps:
      - name: 1) Checkout repository
        uses: actions/checkout@v4

      - name: 2) Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3) Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: 4) Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget jq redis-server mariadb-server mariadb-client \
            libmysqlclient-dev xvfb libfontconfig wkhtmltopdf \
            python3-dev python3-pip python3-venv build-essential

          sudo npm install -g yarn
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install frappe-bench

      - name: 5) Configure MariaDB
        run: |
          echo "[mysqld]" | sudo tee /etc/mysql/mariadb.conf.d/99-frappe.cnf
          echo "character-set-client-handshake = FALSE" | sudo tee -a /etc/mysql/mariadb.conf.d/99-frappe.cnf
          echo "character-set-server = utf8mb4" | sudo tee -a /etc/mysql/mariadb.conf.d/99-frappe.cnf
          echo "collation-server = utf8mb4_unicode_ci" | sudo tee -a /etc/mysql/mariadb.conf.d/99-frappe.cnf
          echo "[mysql]" | sudo tee -a /etc/mysql/mariadb.conf.d/99-frappe.cnf
          echo "default-character-set = utf8mb4" | sudo tee -a /etc/mysql/mariadb.conf.d/99-frappe.cnf

          sudo systemctl restart mariadb
          sudo systemctl restart redis-server

          sudo mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '${DB_ROOT_PASSWORD}'; FLUSH PRIVILEGES;"

      - name: 6) Init bench
        run: |
          bench init frappe-bench --frappe-branch version-15
          cd frappe-bench

          bench get-app erpnext --branch version-15
          bench get-app https://github.com/navariltd/Fleet-Management-System.git

      - name: 7) Create site and install apps
        run: |
          cd frappe-bench

          bench new-site ${SITE_NAME} \
            --mariadb-root-password ${DB_ROOT_PASSWORD} \
            --admin-password ${ADMIN_PASSWORD} \
            --no-mariadb-socket

          bench --site ${SITE_NAME} install-app erpnext
          bench --site ${SITE_NAME} install-app vsd_fleet_ms

      - name: 8) Start services
        run: |
          cd frappe-bench

          nohup bench start > /tmp/fleet-bench.log 2>&1 &
          sleep 90

          echo "=== bench log tail ==="
          tail -n 150 /tmp/fleet-bench.log || true

          echo "=== port check ==="
          ss -tlnp | grep -E '8000|9000|11000|13000' || true

          echo "=== localhost check ==="
          curl -I http://127.0.0.1:8000 || true

      - name: 9) Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: 10) Open temporary URL
        run: |
          for i in {1..12}; do
            if curl -s http://127.0.0.1:8000 >/dev/null; then
              echo "Local web is ready"
              break
            fi
            echo "Waiting for local web..."
            sleep 10
          done

          nohup cloudflared tunnel --url http://127.0.0.1:8000 > /tmp/cloudflared.log 2>&1 &
          sleep 20

          echo "=== cloudflared log ==="
          cat /tmp/cloudflared.log || true

          URL=$(grep -o 'https://[-a-zA-Z0-9]*\.trycloudflare\.com' /tmp/cloudflared.log | head -n 1)

          if [ -z "$URL" ]; then
            echo "Tunnel URL not found"
            exit 1
          fi

          echo "PREVIEW_URL=$URL" >> $GITHUB_ENV

      - name: 11) Show login info
        run: |
          echo ""
          echo "======================================"
          echo "FLEET PREVIEW READY"
          echo "URL      : $PREVIEW_URL"
          echo "User     : Administrator"
          echo "Password : ${ADMIN_PASSWORD}"
          echo "======================================"
          echo ""

      - name: 12) Keep Alive
        run: |
          END=$((SECONDS+18000))
          while [ $SECONDS -lt $END ]; do
            sleep 60
          done
